services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.16-pg16
    container_name: teamtrade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamtrade
      POSTGRES_USER: tt
      POSTGRES_PASSWORD: teamtrade_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tt -d teamtrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Streams ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: teamtrade_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Qdrant Vector DB ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: teamtrade_qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── RSSHub (convierte Truth Social / X / otros en RSS) ─────────────────────
  rsshub:
    image: diygod/rsshub:latest
    container_name: teamtrade_rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      CACHE_TYPE: memory
      CACHE_EXPIRE: 300
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1200/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
  qdrantdata:

networks:
  default:
    name: teamtrade_net
