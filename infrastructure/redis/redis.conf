# TeamTrade Redis configuration

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Streams
# Max length per stream (enforced by application via XADD MAXLEN)
# Kept here as documentation of expected limits

# Networking
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Logging
loglevel notice
